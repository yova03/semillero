<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Semillero · Reseña de paper 1080x1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif { font-family:'Fraunces', Georgia, serif; font-weight:500; }
      .sans  { font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; }
      .body  { font-family:'Inter', system-ui, sans-serif; font-weight:400; }
      .mono  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; }
    </style>
  </defs>
  <rect width="1080" height="1080" fill="#F3F6F4"/>
  <rect x="0" y="0" width="1080" height="8" fill="#1F9C7C"/>
  <!-- EDITAR: área del paper -->
  <text class="mono" x="540" y="78" font-size="18" letter-spacing="5" text-anchor="middle" fill="#5E6F68">RESEÑA · PAPER</text>

  <!-- ── PASO 1: PREGUNTA ── -->
  <rect x="120" y="140" width="5" height="100" fill="#1F9C7C"/>
  <text class="mono" x="143" y="164" font-size="16" letter-spacing="3" fill="#1F9C7C">01 · PREGUNTA</text>
  <!-- EDITAR: pregunta del paper -->
  <text class="body" x="143" y="196" font-size="22" fill="#16241F">¿Por qué los estudiantes de primera</text>
  <text class="body" x="143" y="224" font-size="22" fill="#16241F">generación abandonan en primer año?</text>

  <!-- ── PASO 2: MÉTODO ── -->
  <rect x="120" y="352" width="5" height="100" fill="#D8E0DB"/>
  <text class="mono" x="143" y="376" font-size="16" letter-spacing="3" fill="#9fb0a9">02 · MÉTODO</text>
  <!-- EDITAR: descripción del método -->
  <text class="body" x="143" y="408" font-size="22" fill="#16241F">Encuestas a 340 estudiantes</text>
  <text class="body" x="143" y="436" font-size="22" fill="#16241F">en 5 universidades (2021–2023)</text>

  <!-- ── PASO 3: HALLAZGO ── -->
  <rect x="120" y="562" width="5" height="140" fill="#D8E0DB"/>
  <text class="mono" x="143" y="586" font-size="16" letter-spacing="3" fill="#9fb0a9">03 · HALLAZGO</text>
  <!-- EDITAR: hallazgo principal -->
  <text class="body" x="143" y="618" font-size="22" fill="#16241F">El acceso a redes académicas predice</text>
  <text class="body" x="143" y="646" font-size="22" fill="#16241F">la permanencia, no las calificaciones.</text>
  <text class="sans" x="143" y="690" font-size="24" fill="#16241F">+42% <tspan font-family="'Inter', system-ui" font-weight="400" font-size="20" fill="#5E6F68">con mentor asignado</tspan></text>

  <rect x="120" y="820" width="840" height="1" fill="#D8E0DB"/>
  <!-- EDITAR: referencia del paper -->
  <text class="mono" x="540" y="850" font-size="14" letter-spacing="2" text-anchor="middle" fill="#9fb0a9">DOI: 10.xxxx/ejemplo.2024 · Ciencias de la Educación</text>

  <g transform="translate(64,992) scale(0.5)">
    <circle cx="60" cy="86" r="10" fill="#16241F"/>
    <path d="M60 86 V52" fill="none" stroke="#16241F" stroke-width="3" stroke-linecap="round"/>
    <g fill="none" stroke="#16241F" stroke-width="3" stroke-linecap="round"><path d="M60 58 C48 52 40 42 36 32"/><path d="M60 58 C72 52 80 42 84 32"/><path d="M60 52 V24"/></g>
    <circle cx="36" cy="32" r="6" fill="#F3F6F4" stroke="#16241F" stroke-width="3"/>
    <circle cx="84" cy="32" r="6" fill="#F3F6F4" stroke="#16241F" stroke-width="3"/>
    <circle cx="60" cy="20" r="7" fill="#1F9C7C"/>
  </g>
  <text class="mono" x="120" y="1022" font-size="18" letter-spacing="3" fill="#16241F">SEMILLERO</text>
</svg>
