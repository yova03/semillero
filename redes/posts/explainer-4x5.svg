<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="Semillero · Explainer/Hilo 1080x1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif { font-family:'Fraunces', Georgia, serif; font-weight:500; }
      .sans  { font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; }
      .body  { font-family:'Inter', system-ui, sans-serif; font-weight:400; }
      .mono  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; }
    </style>
  </defs>
  <!-- fondo tinta -->
  <rect width="1080" height="1350" fill="#16241F"/>
  <!-- barra verde superior -->
  <rect x="0" y="0" width="1080" height="8" fill="#1F9C7C"/>
  <!-- EDITAR: tema del hilo + número de parte -->
  <text class="mono" x="120" y="88" font-size="20" letter-spacing="5" fill="#9fb0a9">EXPLAINER</text>
  <text class="mono" x="900" y="88" font-size="20" letter-spacing="3" text-anchor="end" fill="#5E6F68">1 / 5</text>

  <!-- EDITAR: pregunta / concepto central (2 líneas máx) -->
  <text class="serif" x="540" y="340" font-size="82" text-anchor="middle" fill="#FFFFFF">¿Qué es la revisión</text>
  <text class="serif" x="540" y="438" font-size="82" text-anchor="middle" fill="#FFFFFF">por pares<tspan fill="#1F9C7C">?</tspan></text>

  <!-- EDITAR: subtítulo del hilo -->
  <text class="body" x="540" y="510" font-size="24" text-anchor="middle" fill="#9fb0a9">Hilo de 5 partes · Metodología de investigación</text>

  <!-- línea separadora -->
  <rect x="120" y="556" width="840" height="1" fill="#2e4039"/>

  <!-- EDITAR: puntos del explainer (3 puntos) -->
  <!-- Punto 1 (activo, en brote) -->
  <text class="sans" x="120" y="650" font-size="40" fill="#1F9C7C">01</text>
  <text class="body" x="200" y="644" font-size="26" fill="#FFFFFF">Un proceso de evaluación</text>
  <text class="body" x="200" y="676" font-size="26" fill="#FFFFFF">anónima entre expertos.</text>

  <!-- Punto 2 -->
  <text class="sans" x="120" y="762" font-size="40" fill="#5E6F68">02</text>
  <text class="body" x="200" y="756" font-size="26" fill="#9fb0a9">Los revisores no conocen</text>
  <text class="body" x="200" y="788" font-size="26" fill="#9fb0a9">la identidad del autor.</text>

  <!-- Punto 3 -->
  <text class="sans" x="120" y="874" font-size="40" fill="#5E6F68">03</text>
  <text class="body" x="200" y="868" font-size="26" fill="#9fb0a9">Garantiza calidad científica</text>
  <text class="body" x="200" y="900" font-size="26" fill="#9fb0a9">e imparcialidad editorial.</text>

  <!-- línea separadora inferior -->
  <rect x="120" y="960" width="840" height="1" fill="#2e4039"/>

  <!-- EDITAR: CTA al hilo completo -->
  <text class="mono" x="540" y="1010" font-size="18" letter-spacing="4" text-anchor="middle" fill="#1F9C7C">VER HILO COMPLETO →</text>

  <!-- logo-firma: esquina inferior izquierda (versión inversa) -->
  <g transform="translate(64,1268) scale(0.5)">
    <circle cx="60" cy="86" r="10" fill="#FFFFFF"/>
    <path d="M60 86 V52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"><path d="M60 58 C48 52 40 42 36 32"/><path d="M60 58 C72 52 80 42 84 32"/><path d="M60 52 V24"/></g>
    <circle cx="36" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="84" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="60" cy="20" r="7" fill="#1F9C7C"/>
  </g>
  <text class="mono" x="120" y="1298" font-size="18" letter-spacing="3" fill="#9fb0a9">SEMILLERO</text>
</svg>
