<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Semillero · Explainer/Hilo 1080x1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif { font-family:'Fraunces', Georgia, serif; font-weight:500; }
      .sans  { font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; }
      .body  { font-family:'Inter', system-ui, sans-serif; font-weight:400; }
      .mono  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; }
    </style>
  </defs>
  <rect width="1080" height="1080" fill="#16241F"/>
  <rect x="0" y="0" width="1080" height="8" fill="#1F9C7C"/>
  <!-- EDITAR: tema + número de parte -->
  <text class="mono" x="120" y="78" font-size="18" letter-spacing="5" fill="#9fb0a9">EXPLAINER</text>
  <text class="mono" x="900" y="78" font-size="18" letter-spacing="3" text-anchor="end" fill="#5E6F68">1 / 5</text>
  <!-- EDITAR: pregunta central (2 líneas) -->
  <text class="serif" x="540" y="276" font-size="72" text-anchor="middle" fill="#FFFFFF">¿Qué es la revisión</text>
  <text class="serif" x="540" y="360" font-size="72" text-anchor="middle" fill="#FFFFFF">por pares<tspan fill="#1F9C7C">?</tspan></text>
  <!-- EDITAR: subtítulo -->
  <text class="body" x="540" y="416" font-size="22" text-anchor="middle" fill="#9fb0a9">Hilo de 5 partes · Metodología de investigación</text>
  <rect x="120" y="450" width="840" height="1" fill="#2e4039"/>
  <!-- EDITAR: punto 1 (activo) -->
  <text class="sans" x="120" y="524" font-size="36" fill="#1F9C7C">01</text>
  <text class="body" x="196" y="518" font-size="24" fill="#FFFFFF">Un proceso de evaluación</text>
  <text class="body" x="196" y="548" font-size="24" fill="#FFFFFF">anónima entre expertos.</text>
  <!-- EDITAR: punto 2 -->
  <text class="sans" x="120" y="614" font-size="36" fill="#5E6F68">02</text>
  <text class="body" x="196" y="608" font-size="24" fill="#9fb0a9">Los revisores no conocen</text>
  <text class="body" x="196" y="638" font-size="24" fill="#9fb0a9">la identidad del autor.</text>
  <!-- EDITAR: punto 3 -->
  <text class="sans" x="120" y="704" font-size="36" fill="#5E6F68">03</text>
  <text class="body" x="196" y="698" font-size="24" fill="#9fb0a9">Garantiza calidad científica</text>
  <text class="body" x="196" y="728" font-size="24" fill="#9fb0a9">e imparcialidad editorial.</text>
  <rect x="120" y="768" width="840" height="1" fill="#2e4039"/>
  <!-- EDITAR: CTA -->
  <text class="mono" x="540" y="808" font-size="17" letter-spacing="4" text-anchor="middle" fill="#1F9C7C">VER HILO COMPLETO →</text>
  <g transform="translate(64,992) scale(0.5)">
    <circle cx="60" cy="86" r="10" fill="#FFFFFF"/>
    <path d="M60 86 V52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"><path d="M60 58 C48 52 40 42 36 32"/><path d="M60 58 C72 52 80 42 84 32"/><path d="M60 52 V24"/></g>
    <circle cx="36" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="84" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="60" cy="20" r="7" fill="#1F9C7C"/>
  </g>
  <text class="mono" x="120" y="1022" font-size="18" letter-spacing="3" fill="#9fb0a9">SEMILLERO</text>
</svg>
