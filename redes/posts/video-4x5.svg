<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="Semillero · Video/Reel 1080x1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif { font-family:'Fraunces', Georgia, serif; font-weight:500; }
      .sans  { font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; }
      .body  { font-family:'Inter', system-ui, sans-serif; font-weight:400; }
      .mono  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; }
    </style>
  </defs>
  <!-- fondo tinta -->
  <rect width="1080" height="1350" fill="#16241F"/>
  <!-- barra verde superior -->
  <rect x="0" y="0" width="1080" height="8" fill="#1F9C7C"/>
  <!-- EDITAR: área temática del video -->
  <text class="mono" x="540" y="88" font-size="20" letter-spacing="5" text-anchor="middle" fill="#9fb0a9">VIDEO · METODOLOGÍA</text>

  <!-- ícono play centrado -->
  <circle cx="540" cy="380" r="68" fill="none" stroke="#1F9C7C" stroke-width="3"/>
  <!-- triángulo de play: vértice izquierdo centrado ligeramente a la izquierda del centro -->
  <polygon points="518,354 518,406 575,380" fill="#1F9C7C"/>

  <!-- EDITAR: duración del video -->
  <text class="sans" x="540" y="504" font-size="36" text-anchor="middle" fill="#9fb0a9">12:40</text>

  <!-- línea separadora -->
  <rect x="120" y="548" width="840" height="1" fill="#2e4039"/>

  <!-- EDITAR: título del video (2-3 líneas) -->
  <text class="serif" x="540" y="700" font-size="80" text-anchor="middle" fill="#FFFFFF">Cómo diseñar</text>
  <text class="serif" x="540" y="793" font-size="80" text-anchor="middle" fill="#FFFFFF">un experimento</text>
  <text class="serif" x="540" y="886" font-size="80" text-anchor="middle" fill="#FFFFFF">reproducible<tspan fill="#1F9C7C">.</tspan></text>

  <!-- EDITAR: descripción breve (1-2 líneas) -->
  <text class="body" x="540" y="964" font-size="26" text-anchor="middle" fill="#9fb0a9">Fundamentos de metodología</text>
  <text class="body" x="540" y="1000" font-size="26" text-anchor="middle" fill="#9fb0a9">para cualquier disciplina.</text>

  <!-- logo-firma: esquina inferior izquierda (versión inversa) -->
  <g transform="translate(64,1268) scale(0.5)">
    <circle cx="60" cy="86" r="10" fill="#FFFFFF"/>
    <path d="M60 86 V52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"><path d="M60 58 C48 52 40 42 36 32"/><path d="M60 58 C72 52 80 42 84 32"/><path d="M60 52 V24"/></g>
    <circle cx="36" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="84" cy="32" r="6" fill="#16241F" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="60" cy="20" r="7" fill="#1F9C7C"/>
  </g>
  <text class="mono" x="120" y="1298" font-size="18" letter-spacing="3" fill="#9fb0a9">SEMILLERO</text>
</svg>
