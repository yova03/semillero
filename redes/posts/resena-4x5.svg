<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="Semillero · Reseña de paper 1080x1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .serif { font-family:'Fraunces', Georgia, serif; font-weight:500; }
      .sans  { font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; }
      .body  { font-family:'Inter', system-ui, sans-serif; font-weight:400; }
      .mono  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-weight:500; }
    </style>
  </defs>
  <!-- fondo -->
  <rect width="1080" height="1350" fill="#F3F6F4"/>
  <!-- barra verde superior -->
  <rect x="0" y="0" width="1080" height="8" fill="#1F9C7C"/>
  <!-- EDITAR: área de conocimiento -->
  <text class="mono" x="540" y="88" font-size="20" letter-spacing="5" text-anchor="middle" fill="#5E6F68">RESEÑA · PAPER</text>

  <!-- ── PASO 1: PREGUNTA ── -->
  <!-- borde izquierdo en brote = pregunta activa -->
  <rect x="120" y="185" width="5" height="130" fill="#1F9C7C"/>
  <text class="mono" x="143" y="212" font-size="18" letter-spacing="3" fill="#1F9C7C">01 · PREGUNTA</text>
  <!-- EDITAR: pregunta del paper (2 líneas) -->
  <text class="body" x="143" y="252" font-size="26" fill="#16241F">¿Por qué los estudiantes de primera</text>
  <text class="body" x="143" y="286" font-size="26" fill="#16241F">generación abandonan en primer año?</text>

  <!-- ── PASO 2: MÉTODO ── -->
  <rect x="120" y="480" width="5" height="130" fill="#D8E0DB"/>
  <text class="mono" x="143" y="507" font-size="18" letter-spacing="3" fill="#9fb0a9">02 · MÉTODO</text>
  <!-- EDITAR: descripción del método (2 líneas) -->
  <text class="body" x="143" y="547" font-size="26" fill="#16241F">Encuestas a 340 estudiantes</text>
  <text class="body" x="143" y="581" font-size="26" fill="#16241F">en 5 universidades (2021–2023)</text>

  <!-- ── PASO 3: HALLAZGO ── -->
  <rect x="120" y="770" width="5" height="170" fill="#D8E0DB"/>
  <text class="mono" x="143" y="797" font-size="18" letter-spacing="3" fill="#9fb0a9">03 · HALLAZGO</text>
  <!-- EDITAR: hallazgo principal (3 líneas) -->
  <text class="body" x="143" y="837" font-size="26" fill="#16241F">El acceso a redes académicas predice</text>
  <text class="body" x="143" y="871" font-size="26" fill="#16241F">la permanencia, no las calificaciones.</text>
  <!-- dato de impacto en acento -->
  <text class="sans" x="143" y="922" font-size="28" fill="#16241F">+42% <tspan font-family="'Inter', system-ui" font-weight="400" font-size="24" fill="#5E6F68">con mentor asignado</tspan></text>

  <!-- separador y referencia del paper -->
  <rect x="120" y="1060" width="840" height="1" fill="#D8E0DB"/>
  <!-- EDITAR: DOI o referencia abreviada -->
  <text class="mono" x="540" y="1092" font-size="16" letter-spacing="2" text-anchor="middle" fill="#9fb0a9">DOI: 10.xxxx/ejemplo.2024 · Ciencias de la Educación</text>

  <!-- logo-firma: esquina inferior izquierda -->
  <g transform="translate(64,1268) scale(0.5)">
    <circle cx="60" cy="86" r="10" fill="#16241F"/>
    <path d="M60 86 V52" fill="none" stroke="#16241F" stroke-width="3" stroke-linecap="round"/>
    <g fill="none" stroke="#16241F" stroke-width="3" stroke-linecap="round"><path d="M60 58 C48 52 40 42 36 32"/><path d="M60 58 C72 52 80 42 84 32"/><path d="M60 52 V24"/></g>
    <circle cx="36" cy="32" r="6" fill="#F3F6F4" stroke="#16241F" stroke-width="3"/>
    <circle cx="84" cy="32" r="6" fill="#F3F6F4" stroke="#16241F" stroke-width="3"/>
    <circle cx="60" cy="20" r="7" fill="#1F9C7C"/>
  </g>
  <text class="mono" x="120" y="1298" font-size="18" letter-spacing="3" fill="#16241F">SEMILLERO</text>
</svg>
